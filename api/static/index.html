<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Search Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <div class="flex flex-col items-center pt-20">
        <h1 class="text-5xl font-bold text-blue-600 mb-8">Hybrid Search</h1>
        
        <div class="w-full max-w-2xl px-4">
            <div class="flex shadow-lg rounded-full overflow-hidden bg-white border border-gray-200">
                <input id="query" type="text" placeholder="Search the web..." 
                       class="flex-grow px-6 py-4 outline-none text-lg">
                <button onclick="performSearch()" 
                        class="bg-blue-600 text-white px-8 hover:bg-blue-700 transition">Search</button>
            </div>
        </div>

        <div id="results" class="w-full max-w-3xl mt-12 px-4 space-y-8">
            </div>
    </div>

    <script>
        async function performSearch() {
            const query = document.getElementById('query').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p class="text-center text-gray-500">Searching...</p>';

            try {
                const response = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                resultsDiv.innerHTML = data.length ? '' : '<p class="text-center text-gray-500">No results found.</p>';
                
                data.forEach(res => {
                    const item = `
                        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                            <div class="text-sm text-green-700 mb-1">Document ID: ${res.doc_id}</div>
                            <div class="text-xs text-gray-400 mb-2">Relevance Score: ${res.score}</div>
                            <p class="text-gray-700 leading-relaxed">${res.snippet}</p>
                        </div>
                    `;
                    resultsDiv.innerHTML += item;
                });
            } catch (error) {
                resultsDiv.innerHTML = '<p class="text-red-500">Error connecting to engine.</p>';
            }
        }
    </script>
</body>
</html>
